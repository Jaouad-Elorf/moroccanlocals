<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoroccanLocals - Coming Soon</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #4fb3d8, #3aa0c8);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* particles */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* content */
.container {
    text-align: center;
    z-index: 2;
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    font-size: 60px;
    letter-spacing: 2px;
}

/* gradient text */
.gradient-text {
    background: linear-gradient(90deg, #c1272d, #006233);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
}

/* star */
.star {
    color: #c1272d;
    margin: 0 10px;
    animation: spin 6s linear infinite;
}

/* line */
.line {
    width: 80px;
    height: 4px;
    background: white;
    margin: 20px auto;
    border-radius: 5px;
}

/* typing loop */
.typing {
    font-size: 24px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    margin: auto;
    animation: typing 3s steps(20, end) infinite, blink 0.7s infinite;
}

/* animations */
@keyframes typing {
    0% { width: 0 }
    50% { width: 180px }
    100% { width: 0 }
}

@keyframes blink {
    50% { border-color: transparent }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255,255,255,0.3);}
    to { text-shadow: 0 0 20px rgba(255,255,255,0.8);}
}

@keyframes spin {
    from { transform: rotate(0deg);}
    to { transform: rotate(360deg);}
}

/* responsive */
@media (max-width: 600px) {
    h1 { font-size: 40px; }
    .typing { font-size: 18px; }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1 class="gradient-text">
        Moroccan <span class="star">★</span> Locals
    </h1>

    <div class="line"></div>
    <div class="typing">Coming Soon...</div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 3,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
